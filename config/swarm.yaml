# Synapse Swarm — Main Configuration

# tmux session name prefix
session_prefix: synapse

# Where worktrees are created (relative to repo root)
worktree_dir: .worktrees

# Where agent outputs are collected
output_dir: output

# Branch naming pattern: swarm/<session>/<role>
branch_pattern: "swarm/{session}/{role}"

# Maximum parallel agents
max_agents: 6

# Default model for all agents (override per-role in roles.yaml)
default_model: opus

# Auto-merge strategy: "manual" | "sequential" | "octopus"
merge_strategy: manual

# Timeout per agent in seconds (0 = no timeout)
agent_timeout: 0

# Claude Code flags applied to all agents
claude_flags: "--dangerously-skip-permissions"
